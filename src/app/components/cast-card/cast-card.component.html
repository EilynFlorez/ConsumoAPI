<article class="cast">
    <img [src]="actor.person.image.original" alt="Imagen actor">
    <div class="container-info-actor">
        <p><span>ID:</span> {{ actor.person.id }}</p>
        <p><span>Nombre:</span> {{ actor.person.name }}</p>
        <p><span>Nombre del personaje:</span> {{ actor.character.name }}</p>
    </div>
</article>
